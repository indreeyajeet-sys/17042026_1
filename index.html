     pt:users  pt:accounts  pt:amUpdates  pt:stages
     pt:ddOptions  pt:pendingSignups  pt:resetTokens  pt:auditLog
   Session key (private):
     pt:session  — stores logged-in user id

let DB={users:[],accounts:[],amUpdates:[],stages:[],ddOptions:{},pendingSignups:[],resetTokens:[],auditLog:[]};
let CU=null,PAGE='dashboard',MODAL=null,AL=null,
  FILTERS={status:'',partner:'',stage:''},
  SF={red:false,yellow:false,green:false},
  ATAB='login',RS=1,REMAIL='',
  SEARCH='',ASGN='',PIDX=0,PSZ=8,RPTP={},SEL_ACC=null;
let charts={},pollTimer=null,SAVING=false,BOOT=true;

const uid=()=>'_'+Math.random().toString(36).substr(2,9);
const today=()=>new Date().toISOString().split('T')[0];
const nowTs=()=>new Date().toLocaleString('en-IN');
const fmtD=(d)=>d?new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'—';
function odD(d){if(!d)return 0;const diff=new Date(today())-new Date(d);return diff>0?Math.floor(diff/86400000):0;}
function gu(id){return DB.users.find(u=>u.id===id)||{name:'—'};}
function gs(id){return DB.stages.find(s=>s.id===id)||{name:'—'};}
function getAM(accId){return DB.amUpdates.find(a=>a.accountId===accId)||null;}
function sc(s){return s==='red'?'p-red':s==='yellow'?'p-yellow':s==='green'?'p-green':'';}
const isA=()=>CU&&(CU.role==='admin'||CU.role==='superadmin');

/* ---- STORAGE LAYER ---- */
const KEYS=['users','accounts','amUpdates','stages','ddOptions','pendingSignups','resetTokens','auditLog'];

async function storeSave(key){
  try{await window.storage.set('pt:'+key,JSON.stringify(DB[key]),true);}
  catch(e){console.warn('storage write failed',key,e);}
}
async function storeLoad(key){
  try{const r=await window.storage.get('pt:'+key,true);if(r&&r.value){DB[key]=JSON.parse(r.value);return true;}}
  catch(e){}
  return false;
}
async function saveKey(key){SAVING=true;await storeSave(key);SAVING=false;}

async function bootStorage(){
  const results=await Promise.all(KEYS.map(k=>storeLoad(k)));
  const anyLoaded=results.some(Boolean);
  if(!anyLoaded){
    DB={...JSON.parse(JSON.stringify(SEED))};
    await Promise.all(KEYS.map(k=>storeSave(k)));
  } else {
    for(let i=0;i<KEYS.length;i++){
      if(!results[i]){DB[KEYS[i]]=JSON.parse(JSON.stringify(SEED[KEYS[i]]||[]));await storeSave(KEYS[i]);}
    }
  }
  try{
    const sess=await window.storage.get('pt:session',false);
    if(sess&&sess.value){const uid2=JSON.parse(sess.value);const u=DB.users.find(x=>x.id===uid2&&x.status==='active');if(u)CU=u;}
  }catch(e){}
  BOOT=false;R();startPoll();
  document.getElementById('sync-badge').style.display='block';
}

function startPoll(){
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(async()=>{
    if(SAVING)return;
    const snaps=await Promise.all(KEYS.map(k=>window.storage.get('pt:'+k,true).catch(()=>null)));
    let changed=false;
    snaps.forEach((r,i)=>{
      if(r&&r.value){
        const fresh=JSON.parse(r.value);
        if(JSON.stringify(fresh)!==JSON.stringify(DB[KEYS[i]])){DB[KEYS[i]]=fresh;changed=true;}
      }
    });
    if(changed){
      if(CU){const still=DB.users.find(u=>u.id===CU.id&&u.status==='active');if(!still){CU=null;}else CU={...still};}
      R();
    }
  },8000);
}

async function doLogin(){
  const e=(document.getElementById('le')?.value||'').trim(),p=document.getElementById('lp')?.value||'';
  const u=DB.users.find(x=>x.email===e&&x.password===p&&x.status==='active');
  if(u){CU=u;AL=null;PAGE='dashboard';await window.storage.set('pt:session',JSON.stringify(u.id),false);R();}
  else{const pd=DB.pendingSignups.find(x=>x.email===e);pd?sal('Account pending admin approval.','ai',5000):sal('Invalid email or password','ae');}
}
async function doSignup(){
  const n=(document.getElementById('sn')?.value||'').trim(),e=(document.getElementById('se')?.value||'').trim(),p=document.getElementById('sp')?.value||'',nt=(document.getElementById('snt')?.value||'').trim();
  if(!n||!e||!p)return sal('Required fields missing','ae');
  if(p.length<8)return sal('Password must be at least 8 characters','ae');
  if(DB.users.find(u=>u.email===e)||DB.pendingSignups.find(x=>x.email===e))return sal('Email already registered','ae');
  DB.pendingSignups.push({id:uid(),name:n,email:e,password:p,note:nt,requestedAt:today()});
  await saveKey('pendingSignups');ATAB='login';sal('Request submitted! Admin will review shortly.','as',5000);
}
async function rs1(){
  const e=(document.getElementById('re')?.value||'').trim();
  if(!e)return sal('Enter email','ae');if(!DB.users.find(u=>u.email===e))return sal('No account found','ae');
  REMAIL=e;DB.resetTokens=DB.resetTokens.filter(t=>t.email!==e);
  const tok=Math.floor(100000+Math.random()*900000).toString();
  DB.resetTokens.push({email:e,token:tok,used:false});
  await saveKey('resetTokens');RS=2;AL=null;R();
}
async function rs2(){
  const entered=(document.getElementById('rt')?.value||'').trim();
  const tok=DB.resetTokens.find(t=>t.email===REMAIL&&!t.used);
  if(!tok||tok.token!==entered)return sal('Invalid code','ae');RS=3;AL=null;R();
}
async function rs3(){
  const np=document.getElementById('rnp')?.value||'',cp=document.getElementById('rcp')?.value||'';
  if(np.length<8)return sal('Min 8 chars','ae');if(np!==cp)return sal('Passwords do not match','ae');
  const u=DB.users.find(x=>x.email===REMAIL);if(u)u.password=np;
  const tok=DB.resetTokens.find(t=>t.email===REMAIL);if(tok)tok.used=true;
  await Promise.all([saveKey('users'),saveKey('resetTokens')]);
  ATAB='login';RS=1;REMAIL='';sal('Password reset! Sign in.','as',4000);
}
async function doLogout(){
  CU=null;AL=null;ATAB='login';
  try{await window.storage.delete('pt:session',false);}catch(e){}

}

function mH(){
  if(!MODAL)return'';
  const{type,id}=MODAL;let c='';
  const mfi=(l,iid,v='',t='text')=>`<div class="fg"><label class="fl">${l}</label><input type="${t}" id="${iid}" value="${v}"></div>`;
  if(type==='add-partner'||type==='edit-partner'){const p=id?DB.users.find(x=>x.id===id):null;c=`<div class="mt">${id?'Edit Partner':'Add Partner'}</div>${mfi('Full Name *','mn',p?.name||'')}${mfi('Email *','me',p?.email||'','email')}${!id?mfi('Password *','mp','','password'):''}<div class="ma"><button class="abtn-sm btn-ghost" onclick="closeM()">Cancel</button><button class="abtn abtn-blue" style="padding:6px 16px" onclick="savePartner('${id||''}')">Save</button></div>`;}
  else if(type==='add-admin'||type==='edit-admin'){const a=id?DB.users.find(x=>x.id===id):null;c=`<div class="mt">${id?'Edit Admin':'Add Admin'}</div>${mfi('Full Name *','mn',a?.name||'')}${mfi('Email *','me',a?.email||'','email')}${!id?mfi('Password *','mp','','password'):''}<div class="ma"><button class="abtn-sm btn-ghost" onclick="closeM()">Cancel</button><button class="abtn abtn-blue" style="padding:6px 16px" onclick="saveAdmin('${id||''}')">Save</button></div>`;}
  else if(type==='add-stage'||type==='edit-stage'){const s=id?DB.stages.find(x=>x.id===id):null;c=`<div class="mt">${id?'Edit Stage':'Add Stage'}</div>${mfi('Stage Name *','mn',s?.name||'')}<div class="ma"><button class="abtn-sm btn-ghost" onclick="closeM()">Cancel</button><button class="abtn abtn-blue" style="padding:6px 16px" onclick="saveStage('${id||''}')">Save</button></div>`;}
  else if(type==='reset-pw'){const u=DB.users.find(x=>x.id===id);c=`<div class="mt">Reset Password — ${u?.name||''}</div><div class="infob">Set a temporary password for this user.</div>${mfi('New Password *','mnp','','password')}${mfi('Confirm *','mcp','','password')}<div class="ma"><button class="abtn-sm btn-ghost" onclick="closeM()">Cancel</button><button class="abtn-sm btn-yel" style="padding:4px 12px" onclick="adminRPw('${id}')">Reset</button></div>`;}
  else if(type==='schedule-meeting'){c=`<div class="mt">Schedule Meeting</div>
    <div class="fg2">
      <div class="fg"><label class="fl">Account</label><select id="sm-co"><option value="">Select...</option>${DB.accounts.map(a=>`<option value="${a.id}">${a.companyName}</option>`).join('')}</select></div>
      <div class="fg"><label class="fl">Meeting Date</label><input type="date" id="sm-date"></div>
      <div class="fg"><label class="fl">Connect Type</label><select id="sm-type">${(DB.ddOptions.connectStage||[]).map(o=>`<option>${o}</option>`).join('')}</select></div>
      <div class="fg"><label class="fl">Partner</label><select id="sm-pa">${DB.users.filter(u=>u.role==='partner').map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select></div>
    </div>
    <div class="fg"><label class="fl">Notes</label><textarea id="sm-notes" placeholder="Agenda, attendees..."></textarea></div>
    <div class="ma"><button class="abtn-sm btn-ghost" onclick="closeM()">Cancel</button><button class="abtn abtn-orange" style="padding:6px 16px" onclick="closeM();sal('Meeting scheduled!','as')">Schedule</button></div>`;}
  return`<div class="mo" onclick="if(event.target===this)closeM()"><div class="mc">${c}</div></div>`;}

function openM(t,id=null){MODAL={type:t,id};R();}
function closeM(){MODAL=null;R();}
function selCS(el,val){document.querySelectorAll('.csp').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');const h=document.getElementById('f-cs');if(h)h.value=val;}
function calcOD(val){const el=document.getElementById('od-disp');if(!el)return;const od=odD(val);el.textContent=val?(od>0?`+${od} days overdue`:'On track — not overdue'):'Enter next connect date';}

/* ---- ALL SAVE FUNCTIONS — write to persistent storage ---- */
async function saveAMUpdate(accId,existingAmId){
  const cs=document.getElementById('f-cs')?.value||'',acd=document.getElementById('f-acd')?.value||'',ncd=document.getElementById('f-ncd')?.value||'',ai=document.getElementById('f-ai')?.value||'';
  const acc=DB.accounts.find(a=>a.id===accId);
  if(!acd&&!ncd)return sal('Please enter at least one date','ae');
  const entry={id:existingAmId||uid(),accountId:accId,partnerId:CU.id,connectStage:cs,actionItem:ai,connectDateDM:acd,nextConnectDateDM:ncd,updatedAt:today()};
  if(existingAmId){const i=DB.amUpdates.findIndex(a=>a.id===existingAmId);if(i>-1)DB.amUpdates[i]=entry;else DB.amUpdates.push(entry);}
  else DB.amUpdates.push(entry);
  DB.auditLog.unshift({ts:nowTs(),user:CU.name,role:CU.role,action:'Updated AM Connect',record:acc?.companyName||accId,field:'amConnect',oldv:'',newv:cs});
  await Promise.all([saveKey('amUpdates'),saveKey('auditLog')]);
  sal('AM Connect saved and synced!','as');
}
async function saveAccount(id){
  const cname=(document.getElementById('fa-cname')?.value||'').trim();
  if(!cname)return sal('Company name is required','ae');
  const acc={id:id||uid(),companyName:cname,companyEmail:document.getElementById('fa-cemail')?.value||'',focusArea:document.getElementById('fa-focus')?.value||'',accountGroup:document.getElementById('fa-group')?.value||'',programManager:document.getElementById('fa-pm')?.value||'',companyType:document.getElementById('fa-ctype')?.value||'',accountPriority:document.getElementById('fa-priority')?.value||'',opportunityCategory:document.getElementById('fa-ocat')?.value||'',crop:document.getElementById('fa-crop')?.value||'',stageId:document.getElementById('fa-stage')?.value||'',overallStatus:document.getElementById('fa-status')?.value||'yellow',assignedPartnerId:document.getElementById('fa-partner')?.value||'',trials:{stage:document.getElementById('fa-tstage')?.value||'',status:document.getElementById('fa-tstatus')?.value||'yellow',connectDate:document.getElementById('fa-tcd')?.value||'',agriManager:document.getElementById('fa-agrimgr')?.value||'',remarks:document.getElementById('fa-remarks')?.value||''},createdAt:id?(DB.accounts.find(a=>a.id===id)?.createdAt||today()):today(),updatedAt:today()};
  if(id){const i=DB.accounts.findIndex(a=>a.id===id);if(i>-1)DB.accounts[i]=acc;}else DB.accounts.push(acc);
  DB.auditLog.unshift({ts:nowTs(),user:CU.name,role:CU.role,action:id?'Updated account record':'Created account record',record:cname,field:'overview',oldv:'',newv:'saved'});
  window._adminSelAcc=acc.id;
  await Promise.all([saveKey('accounts'),saveKey('auditLog')]);
  sal(id?'Account updated and synced!':'Account created and synced!','as');
}
async function deleteAccount(id){
  const acc=DB.accounts.find(a=>a.id===id);
  DB.accounts=DB.accounts.filter(a=>a.id!==id);DB.amUpdates=DB.amUpdates.filter(a=>a.accountId!==id);
  DB.auditLog.unshift({ts:nowTs(),user:CU.name,role:CU.role,action:'Deleted account',record:acc?.companyName||id,field:'',oldv:acc?.companyName||'',newv:'deleted'});
  window._adminSelAcc=null;
  await Promise.all([saveKey('accounts'),saveKey('amUpdates'),saveKey('auditLog')]);
  sal(`Account "${acc?.companyName}" deleted`,'as');
}
async function approveP(id){const p=DB.pendingSignups.find(x=>x.id===id);if(!p)return;DB.users.push({id:uid(),name:p.name,email:p.email,password:p.password,role:'partner',status:'active',createdAt:today()});DB.pendingSignups=DB.pendingSignups.filter(x=>x.id!==id);DB.auditLog.unshift({ts:nowTs(),user:CU.name,role:CU.role,action:'Approved partner signup',record:p.name,field:'status',oldv:'pending',newv:'active'});await Promise.all([saveKey('users'),saveKey('pendingSignups'),saveKey('auditLog')]);sal(`${p.name} approved!`,'as');}
async function rejectP(id){const p=DB.pendingSignups.find(x=>x.id===id);DB.pendingSignups=DB.pendingSignups.filter(x=>x.id!==id);await saveKey('pendingSignups');sal(`${p?.name||'Request'} rejected`,'as');}
async function adminRPw(id){const np=document.getElementById('mnp')?.value||'',cp=document.getElementById('mcp')?.value||'';if(np.length<8)return sal('Min 8 chars','ae');if(np!==cp)return sal('Passwords do not match','ae');const u=DB.users.find(x=>x.id===id);if(u)u.password=np;await saveKey('users');closeM();sal('Password reset!','as');}
async function saveProfile(){const n=(document.getElementById('men')?.value||'').trim(),e=(document.getElementById('mee')?.value||'').trim();if(!n||!e)return sal('Fields required','ae');if(DB.users.find(u=>u.email===e&&u.id!==CU.id))return sal('Email in use','ae');CU.name=n;CU.email=e;const u=DB.users.find(x=>x.id===CU.id);if(u){u.name=n;u.email=e;}await saveKey('users');sal('Profile updated!','as');}
async function changePw(){const cur=document.getElementById('mec')?.value||'',np=document.getElementById('men2')?.value||'',cp=document.getElementById('mecf')?.value||'';if(cur!==CU.password)return sal('Current password incorrect','ae');if(np.length<8)return sal('Min 8 chars','ae');if(np!==cp)return sal('Passwords do not match','ae');CU.password=np;const u=DB.users.find(x=>x.id===CU.id);if(u)u.password=np;await saveKey('users');sal('Password updated!','as');}
async function savePartner(id){const n=(document.getElementById('mn')?.value||'').trim(),e=(document.getElementById('me')?.value||'').trim(),p=id?null:(document.getElementById('mp')?.value||'');if(!n||!e||(!id&&!p))return sal('Fields required','ae');if(!id&&p.length<8)return sal('Min 8 chars','ae');if(id){const u=DB.users.find(x=>x.id===id);if(u){u.name=n;u.email=e;}}else{if(DB.users.find(u=>u.email===e))return sal('Email in use','ae');DB.users.push({id:uid(),name:n,email:e,password:p,role:'partner',status:'active',createdAt:today()});}await saveKey('users');closeM();sal('Partner saved!','as');}
async function delPartner(id){if(id===CU.id)return sal("Can't remove yourself",'ae');DB.users=DB.users.filter(u=>u.id!==id);await saveKey('users');sal('Partner removed','as');}
async function saveAdmin(id){const n=(document.getElementById('mn')?.value||'').trim(),e=(document.getElementById('me')?.value||'').trim(),p=id?null:(document.getElementById('mp')?.value||'');if(!n||!e||(!id&&!p))return sal('Fields required','ae');if(!id&&p.length<8)return sal('Min 8 chars','ae');if(id){const u=DB.users.find(x=>x.id===id);if(u){u.name=n;u.email=e;}}else{if(DB.users.find(u=>u.email===e))return sal('Email in use','ae');DB.users.push({id:uid(),name:n,email:e,password:p,role:'admin',status:'active',createdAt:today()});}await saveKey('users');closeM();sal('Admin saved!','as');}
async function delAdmin(id){if(id===CU.id)return sal("Can't remove yourself",'ae');DB.users=DB.users.filter(u=>u.id!==id);await saveKey('users');sal('Admin removed','as');}
async function saveStage(id){const n=(document.getElementById('mn')?.value||'').trim();if(!n)return sal('Stage name required','ae');if(id){const s=DB.stages.find(x=>x.id===id);if(s)s.name=n;}else DB.stages.push({id:uid(),name:n});await saveKey('stages');closeM();sal('Stage saved!','as');}
async function delStage(id){DB.stages=DB.stages.filter(s=>s.id!==id);await saveKey('stages');sal('Stage deleted','as');}
async function addDD(key){const inp=document.getElementById(`dd-${key}`);if(!inp?.value.trim())return;if(!DB.ddOptions[key])DB.ddOptions[key]=[];if(!DB.ddOptions[key].includes(inp.value.trim()))DB.ddOptions[key].push(inp.value.trim());inp.value='';await saveKey('ddOptions');sal('Option added!','as');}
async function removeDD(key,i){DB.ddOptions[key].splice(i,1);await saveKey('ddOptions');sal('Option removed','as');}

/* ---- BOOT ---- */
bootStorage().catch(err=>{
  console.error('Storage boot failed:',err);
  DB=JSON.parse(JSON.stringify(SEED));BOOT=false;R();
});
</script>
